<!DOCTYPE html>
<html lang="pt-br">
<head>

    <title>Bem-vindo ao Bafafá</title>

        body { background: #121212; color: white; font-family: sans-serif; text-align: center; padding: 50px 20px; }
        .success-box { border: 3px solid #2ecc71; padding: 30px; border-radius: 20px; display: inline-block; }
        .btn-bar { display: inline-block; background: #f1c40f; color: black; padding: 20px 40px; border-radius: 10px; text-decoration: none; font-weight: bold; margin-top: 30px; font-size: 20px; }

</head>
<body>
    <div class="success-box">
        <h1 style="color: #2ecc71;">✅ ENTRADA LIBERADA!</h1>

        <p>Para comprar bebidas e combos, clique no botão abaixo para abrir seu cardápio digital:</p>

</html>
