<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrega Bar - Bafafá</title>
    <style>
        body { background: #000; color: white; font-family: sans-serif; text-align: center; padding: 50px; }
        .card-entrega { border: 5px solid #2ecc71; padding: 30px; border-radius: 20px; background: #111; }
        .item { font-size: 40px; color: #f1c40f; font-weight: bold; margin: 20px 0; }
        .cliente { font-size: 20px; color: #bbb; }
        .btn-voltar { background: #2ecc71; color: black; padding: 20px; text-decoration: none; border-radius: 10px; font-weight: bold; display: inline-block; margin-top: 30px; }
    </style>
</head>
<body>
    <div class="card-entrega">
        <h1 style="color: #2ecc71;">✅ ENTREGA LIBERADA</h1>
        <p class="cliente">CLIENTE: {{ cliente.nome }}</p>
        <hr>
        <p>ENTREGAR AGORA:</p>
        <div class="item">{{ produto.nome }}</div>
        <p style="font-size: 12px; color: #555;">Validado por: {{ funcionario }}</p>
    </div>
    <a href="/painel-barman" class="btn-voltar">PRÓXIMO PEDIDO</a>
</body>
</html>
