<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Master Admin - Bafafá</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; padding: 20px; }
        .secao { background: #1a1a1a; padding: 20px; border-radius: 10px; margin-bottom: 25px; border: 1px solid #f1c40f; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; border-bottom: 1px solid #333; text-align: left; }
        .btn { background: #f1c40f; color: black; padding: 10px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        input, select { padding: 8px; border-radius: 5px; border: 1px solid #333; background: #000; color: white; margin: 5px; }
    </style>
</head>
<body>
    <h1 style="color: #f1c40f; text-align: center;">CENTRAL DE CONTROLE BAF AFÁ 🎷</h1>

    <div class="secao">
        <h2>👥 CADASTRAR FUNCIONÁRIO (Todos os setores)</h2>
        <form method="POST">
            <input type="hidden" name="novo_staff" value="1">
            <input type="text" name="nome" placeholder="Nome Completo" required>
            <input type="text" name="user" placeholder="Login de Acesso" required>
            <input type="password" name="pass" placeholder="Senha" required>
            <select name="cargo">
                <option value="portaria">Segurança / Portaria</option>
                <option value="bar">Gerente de Bar / Barman</option>
                <option value="musico">Músico / Banda</option>
                <option value="limpeza">Equipe de Limpeza</option>
                <option value="carregador">Carregador / Montagem</option>
                <option value="admin">Administrador Master</option>
            </select>
            <button type="submit" class="btn">CRIAR ACESSO</button>
        </form>
    </div>

    <div class="secao">
        <h2>🍺 GESTÃO DE ESTOQUE E PREÇOS</h2>
        <table>
            <tr><th>Item</th><th>Custo</th><th>Venda</th><th>Qtd</th><th>Ação</th></tr>
            {% for p in produtos %}
            <tr>
                <form method="POST">
                    <input type="hidden" name="id_prod" value="{{ p.id }}">
                    <td>{{ p.nome }}</td>
                    <td><input type="number" step="0.01" name="custo" value="{{ p.preco_custo }}" style="width: 70px;"></td>
                    <td><input type="number" step="0.01" name="venda" value="{{ p.preco_venda }}" style="width: 70px;"></td>
                    <td><input type="number" name="estoque" value="{{ p.estoque }}" style="width: 50px;"></td>
                    <td><button type="submit" class="btn">💾</button></td>
                </form>
            </tr>
            {% endfor %}
        </table>
    </div>
</body>
</html>
