<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel Admin - Bafafá</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; }
        .card { background: #111; padding: 20px; border-radius: 10px; border: 1px solid #f1c40f; margin-bottom: 20px; }
        input, select { width: 100%; padding: 10px; margin: 5px 0; background: #222; color: #fff; border: 1px solid #333; }
        .btn { background: #f1c40f; color: #000; padding: 10px; border: none; cursor: pointer; font-weight: bold; width: 100%; }
        table { width: 100%; margin-top: 20px; border-collapse: collapse; }
        th { color: #f1c40f; text-align: left; padding: 10px; border-bottom: 1px solid #333; }
        td { padding: 10px; border-bottom: 1px solid #222; }
    </style>
</head>
<body>
    <h1>FINANCEIRO: R$ {{ total_entradas }}</h1>

    <div class="card">
        <h3><i class="fas fa-box"></i> Novo Produto (Bar Digital)</h3>
        <form action="/admin_total" method="POST">
            <input type="hidden" name="form_tipo" value="produto">
            <input type="text" name="n" placeholder="Nome da Bebida" required>
            <input type="text" name="img" placeholder="URL da Imagem" required>
            <input type="number" step="0.01" name="pv" placeholder="Preço de Venda" required>
            <input type="number" step="0.01" name="pc" placeholder="Preço de Custo" required>
            <input type="number" name="e" placeholder="Estoque Inicial" required>
            <button type="submit" class="btn">SALVAR PRODUTO</button>
        </form>
    </div>

    <div class="card">
        <h3><i class="fas fa-users"></i> Equipe e Caixinhas</h3>
        <table>
            <tr><th>Nome</th><th>Cargo</th><th>Caixinha Acumulada</th></tr>
            {% for f in equipe %}
            <tr>
                <td>{{ f.nome }}</td>
                <td>{{ f.cargo }}</td>
                <td style="color: #00ff88;">R$ {{ f.caixinha_total }}</td>
            </tr>
            {% endfor %}
        </table>
    </div>

    <a href="/logout" style="color: red; text-decoration: none;">SAIR DO SISTEMA</a>
</body>
</html>
