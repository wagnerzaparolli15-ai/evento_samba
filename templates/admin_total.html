<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Master Bafafá</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 12px; border: 1px solid #333; }
        .resumo { font-size: 24px; font-weight: bold; color: #00ff88; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: #252525; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #444; }
        th { background: #333; }
        .badge { background: #6200ee; padding: 5px 10px; border-radius: 4px; font-size: 12px; }
        input, select { padding: 8px; margin: 5px 0; width: 100%; box-sizing: border-box; }
        .btn { background: #28a745; color: white; border: none; padding: 10px; cursor: pointer; width: 100%; border-radius: 4px; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="grid">
        <div class="card">
            <h3>💰 Contabilidade Real</h3>
            <p>Receita Bruta: <span class="resumo">R$ {{ "%.2f"|format(fin.receita) }}</span></p>
            <p>Lucro Líquido: <span style="color: #00d4ff;">R$ {{ "%.2f"|format(fin.lucro) }}</span></p>
            <p>Pessoas na Casa: <strong>{{ fin.na_casa }}</strong></p>
        </div>

        <div class="card">
            <h3>👥 Cadastrar Equipe</h3>
            <form method="POST">
                <input type="hidden" name="add_equipe" value="1">
                <input type="text" name="nome" placeholder="Nome" required>
                <input type="text" name="usuario" placeholder="Login" required>
                <input type="text" name="senha" placeholder="Senha" required>
                <input type="text" name="cargo" placeholder="Cargo (portaria/bar)">
                <input type="number" name="cachet" placeholder="Cachê R$" step="0.01">
                <button type="submit" class="btn">Salvar Funcionário</button>
            </form>
        </div>
