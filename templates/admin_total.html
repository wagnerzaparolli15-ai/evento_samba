<div class="main-admin">
    <div class="card-fin">
        <h3>💰 RESUMO FINANCEIRO</h3>
        <p>Entradas (Ingressos): R$ {{ total_entradas }}</p>
        <p>Custos (Staff + Operação): R$ {{ total_custos }}</p>
        <h2 style="color: #00ff88;">LUCRO ESTIMADO: R$ {{ total_entradas - total_custos }}</h2>
    </div>

    <div class="secoes">
        <section>
            <h3>🍺 GESTÃO DO BAR</h3>
            <form method="POST">
                <input type="hidden" name="form_tipo" value="produto">
                <input type="text" name="n" placeholder="Nome da Bebida" required>
                <input type="number" name="pc" placeholder="Preço Custo" step="0.01">
                <input type="number" name="pv" placeholder="Preço Venda" step="0.01">
                <input type="number" name="e" placeholder="Estoque">
                <input type="text" name="img" placeholder="Nome da Imagem (cerveja.png)">
                <button type="submit" class="btn">CADASTRAR PRODUTO</button>
            </form>
        </section>

        <section>
            <h3>💸 LANÇAR CUSTO OPERACIONAL</h3>
            <form method="POST">
                <input type="hidden" name="form_tipo" value="custo">
                <input type="text" name="d" placeholder="Descrição (ex: Aluguel de Som)">
                <input type="number" name="v" placeholder="Valor R$">
                <button type="submit" class="btn">REGISTRAR GASTO</button>
            </form>
        </section>
    </div>
</div>
