<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Master - Bafafá</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #f1c40f; --bg: #000; --card: #111; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; padding: 20px; }
        .logo-adm { text-align: center; margin-bottom: 20px; }
        .logo-adm img { width: 120px; }
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: var(--card); padding: 20px; border-radius: 10px; border-left: 5px solid var(--gold); text-align: center; }
        .section { background: var(--card); padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #333; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #222; }
        input { background: #222; color: #fff; border: 1px solid #444; padding: 5px; border-radius: 5px; }
        .btn-green { background: #2ecc71; color: #000; border: none; padding: 8px 15px; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="logo-adm">
        <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo">
        <h1 style="color: var(--gold);">ADMINISTRAÇÃO BAFAFÁ</h1>
    </div>

    <div class="dashboard">
        <div class="stat-card"><h3>Entradas</h3><p>R$ {{ total_entradas }}</p></div>
        <div class="stat-card"><h3>Custos</h3><p style="color:red;">R$ {{ total_custos }}</p></div>
        <div class="stat-card"><h3>Lucro</h3><p style="color:#00ff88;">R$ {{ total_entradas - total_custos }}</p></div>
    </div>

    <div class="section">
        <h2><i class="fas fa-beer"></i> Edição Rápida de Preços e Estoque</h2>
        <table>
            <tr><th>Produto</th><th>Venda (R$)</th><th>Custo (R$)</th><th>Estoque</th><th>Ação</th></tr>
            {% for p in produtos %}
            <tr>
                <form action="/atualizar-produto/{{ p.id }}" method="POST">
                    <td><strong>{{ p.nome }}</strong></td>
                    <td><input type="number" step="0.01" name="pv" value="{{ p.preco_venda }}"></td>
                    <td><input type="number" step="0.01" name="pc" value="{{ p.preco_custo }}"></td>
                    <td><input type="number" name="e" value="{{ p.estoque }}"></td>
                    <td><button type="submit" class="btn-green">SALVAR</button></td>
                </form>
            </tr>
            {% endfor %}
        </table>
    </div>

    </body>
</html>
