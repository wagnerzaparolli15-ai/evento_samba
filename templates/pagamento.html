<!DOCTYPE html>
<html lang="pt-br">
<head>

        <p style="color: #e74c3c; font-weight: bold;">⚠️ NÃO ALTERE OS CENTAVOS PARA VALIDAR!</p>
        <a href="/ingresso/{{ c.id }}" class="btn">JÁ PAGUEI, VER MEU INGRESSO</a>
    </div>

</html>
