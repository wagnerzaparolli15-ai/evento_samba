<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamento - Bafafá 2026</title>
    <style>
        :root { --gold: #f1c40f; }
        body { background: linear-gradient(135deg, #050505 0%, #1a1a00 100%); background-attachment: fixed; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .card { background: rgba(20,20,20,0.9); padding: 25px; border-radius: 20px; border: 1px solid var(--gold); max-width: 400px; margin: auto; backdrop-filter: blur(10px); }
        img.logo { width: 100px; margin-bottom: 15px; }
        .qr-box { background: #fff; padding: 15px; border-radius: 10px; display: inline-block; margin: 20px 0; }
        .copy-paste { background: #000; border: 1px dashed var(--gold); padding: 10px; font-size: 0.8rem; word-break: break-all; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <img src="{{ url_for('static', filename='logo.png') }}" class="logo">
        <h2 style="color:var(--gold)">PAGAMENTO PIX</h2>
        <p>{{ c.nome }}, pague agora para liberar seu ingresso:</p>
        <div class="qr-box">
            <img src="data:image/png;base64,{{ qr_img }}" width="200">
        </div>
        <p>Ou use o Copia e Cola:</p>
        <div class="copy-paste">{{ pix_copia_cola }}</div>
        <p style="margin-top:20px; font-size: 0.8rem; color: #888;">Após pagar, o ingresso será liberado automaticamente.</p>
    </div>
</body>
</html>
