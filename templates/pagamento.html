<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Pagamento - Pagode do Cara</title>
    <style>
        body { background: #000; color: white; font-family: sans-serif; text-align: center; padding: 50px 20px; }
        .container { background: rgba(0,0,0,0.9); padding: 30px; border-radius: 20px; border: 2px solid #f1c40f; display: inline-block; }
        .valor { font-size: 45px; color: #2ecc71; font-weight: bold; }
        .qrcode-pix { background: white; padding: 10px; border-radius: 10px; margin: 20px auto; width: 220px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>PAGAMENTO PIX</h1>
        <div class="qrcode-pix"><img src="data:image/jpeg;base64,{{ qrcode_base64 }}" style="width:100%"></div>
        <p>Valor:</p><div class="valor">R$ 45,00</div>
        <p>Código Pix:</p><small style="word-break: break-all;">{{ pix_codigo }}</small><br><br>
        <a href="/ingresso/{{ c.id }}" style="background:#f1c40f; color:#000; padding:15px; border-radius:8px; text-decoration:none; font-weight:bold;">JÁ PAGUEI, VER MEU INGRESSO</a>
    </div>
</body>
</html>
