<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamento - Bafafá 2026</title>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; text-align: center; padding: 20px; }
        .card { background: #111; padding: 20px; border-radius: 15px; border: 1px solid #333; max-width: 400px; margin: auto; }
        .qr-area { background: #fff; padding: 15px; display: inline-block; border-radius: 10px; margin: 20px 0; }
        .btn { display: block; background: #00ff88; color: #000; padding: 15px; text-decoration: none; border-radius: 8px; font-weight: bold; margin-top: 10px; }
        .metodo { color: #00d4ff; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Finalizar Reserva</h2>
        <p>Cliente: <strong>{{ c.nome }}</strong></p>
        <p class="metodo">Forma: {{ tipo.upper() }}</p>
        <p>Total: <strong>R$ {{ "%.2f"|format(c.valor_total) }}</strong></p>

        <div class="qr-area">
            <img src="data:image/png;base64,{{ qr_img }}" alt="QR Code de Pagamento" style="width: 200px;">
        </div>

        <p>Aponte a câmera ou use o App do Banco</p>
        <a href="/ingresso/{{ c.id }}" class="btn">JÁ PAGUEI, VER INGRESSO</a>
    </div>
</body>
</html>
