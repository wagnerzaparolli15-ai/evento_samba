<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Seu Ingresso - Bafafá</title>
    <style>
        body { background: #000 url("/static/fundo.jpg") no-repeat center center fixed; background-size: cover; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .ticket { background: #fff; color: #000; max-width: 320px; margin: 20px auto; padding: 25px; border-radius: 20px; border: 5px solid #f1c40f; }
        .logo { width: 100px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="ticket">
        <img src="/static/logo.jpg" class="logo">
        <h2>{{ c.nome }}</h2>
        <p style="background: #f1c40f; font-weight: bold; padding: 5px;">INGRESSO CONFIRMADO ✅</p>
        <hr>
        <p>Apresente ao segurança:</p>
        
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=220x220&data={{ checkin_url }}" alt="QR Code">
        
        <p style="font-size: 12px; color: #666; margin-top: 15px;">Reserva #{{ c.id }}</p>
    </div>
</body>
</html>
