<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Ingresso - Bafafá 2026</title>
    <style>
        :root { --gold: #f1c40f; }
        body { background: linear-gradient(135deg, #050505 0%, #1a1a00 100%); color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .ticket { background: rgba(20,20,20,0.9); padding: 30px; border-radius: 25px; border: 2px solid var(--gold); max-width: 400px; margin: auto; }
        img.logo { width: 120px; margin-bottom: 20px; }
        .qr-checkin { background: #fff; padding: 15px; border-radius: 15px; display: inline-block; margin: 20px 0; border: 5px solid var(--gold); }
        .btn-bar { display: block; background: var(--gold); color: #000; padding: 15px; border-radius: 10px; text-decoration: none; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="ticket">
        <img src="{{ url_for('static', filename='logo.png') }}" class="logo">
        <h2 style="color:var(--gold); margin:0;">INGRESSO CONFIRMADO</h2>
        <p style="text-transform: uppercase; letter-spacing: 2px;">{{ c.nome }}</p>
        <div class="qr-checkin">
            <img src="data:image/png;base64,{{ qr_checkin }}" width="220">
        </div>
        <p>Apresente este QR Code na portaria.</p>
        <a href="/bar-digital/{{ c.id }}" class="btn-bar">ACESSAR BAR DIGITAL</a>
    </div>
</body>
</html>
