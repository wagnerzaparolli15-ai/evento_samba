<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Seu Ingresso - Bafafá</title>
    <style>
        body { 
            background: #000 url("/static/fundo.jpg") no-repeat center center fixed; 
            background-size: cover; 
            color: white; 
            font-family: sans-serif; 
            text-align: center; 
            padding: 20px; 
        }
        .ticket { 
            background: #fff; 
            color: #000; 
            max-width: 320px; 
            margin: 20px auto; 
            padding: 25px; 
            border-radius: 20px; 
            border: 5px solid #f1c40f; 
            box-shadow: 0 0 20px rgba(241,196,15,0.5); 
        }
        .logo { width: 100px; border-radius: 10px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="ticket">
        <img src="/static/logo.jpg" class="logo">
        <h2 style="margin: 0;">{{ c.nome }}</h2>
        <p style="background: #f1c40f; font-weight: bold; padding: 5px; margin: 10px 0;">INGRESSO CONFIRMADO ✅</p>
        <hr>
        <p>Apresente este QR Code na portaria para o segurança:</p>
        
        <img src="https://chart.googleapis.com/chart?chs=220x220&cht=qr&chl={{ checkin_url }}&choe=UTF-8" alt="QR Code de Entrada">
        
        <p style="font-size: 12px; color: #666; margin-top: 15px;">Reserva #{{ c.id }} - Válido para 1 pessoa</p>
    </div>
</body>
</html>
