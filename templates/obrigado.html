<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Seu Ingresso - Bafafá</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; text-align: center; padding: 20px; }
        .ingresso { background: #111; border: 2px dashed #00ff88; padding: 25px; border-radius: 15px; }
        .status { color: #00ff88; font-weight: bold; }
    </style>
</head>
<body>
    <div class="ingresso">
        <h1>Bafafá 2026</h1>
        <p>Apresente este ingresso na porta</p>
        <hr>
        <h2>{{ c.nome }}</h2>
        <p class="status">PAGAMENTO CONFIRMADO via {{ c.metodo.upper() }}</p>
        <p>ID: #{{ c.id }}</p>
        <br>
        <p style="font-size: 12px; color: #666;">O link do bar será liberado no check-in</p>
    </div>
</body>
</html>
