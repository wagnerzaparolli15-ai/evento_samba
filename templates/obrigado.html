<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seu Ingresso | Faz com Fé</title>
    <style>
        body { background: #000; color: #fff; text-align: center; font-family: sans-serif; padding: 20px; }
        .ticket { background: #111; border: 2px solid #f1c40f; padding: 25px; max-width: 350px; margin: auto; border-radius: 15px; }
        .qr-box { background: #fff; padding: 10px; display: inline-block; margin: 20px 0; border-radius: 8px; }
        .btn-zap { display: block; background: #25d366; color: #fff; padding: 15px; text-decoration: none; font-weight: bold; border-radius: 5px; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="ticket">
        <h2 style="color:#f1c40f">INGRESSO GARANTIDO!</h2>
        <p><strong>NOME:</strong> {{ nome }}</p>
        <p><strong>ID DO PEDIDO:</strong> #{{ id_cliente }}</p>
        
        <div class="qr-box">
            <div id="qrcode"></div>
        </div>
        
        <p style="font-size:0.8rem; color:#888;">Apresente este QR Code na portaria para validar sua entrada.</p>
        <p>Valor: R$ {{ "%.2f"|format(valor) }}</p>
        <a href="https://wa.me/5521980737063?text=Oi! Fiz a reserva de {{ nome }} (ID: {{ id_cliente }}). Segue o comprovante." class="btn-zap">ENVIAR COMPROVANTE PIX</a>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        // O link do QR Code é individual baseado no ID do banco de dados
        var linkCheckin = "https://evento-samba.onrender.com/checkin/{{ id_cliente }}";
        new QRCode(document.getElementById("qrcode"), {
            text: linkCheckin,
            width: 180,
            height: 180
        });
    </script>
</body>
</html>
