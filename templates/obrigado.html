<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seu Ingresso</title>
    <style>
        body { background: #000; color: #fff; text-align: center; font-family: sans-serif; padding: 20px; }
        .ticket { background: #111; border: 2px solid #f1c40f; padding: 25px; max-width: 350px; margin: auto; border-radius: 15px; }
        .qr-box { background: #fff; padding: 10px; display: inline-block; margin: 20px 0; border-radius: 8px; }
        .btn-zap { display: block; background: #25d366; color: #fff; padding: 15px; text-decoration: none; font-weight: bold; border-radius: 5px; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="ticket">
        <h2 style="color:#f1c40f">ESTÁ GARANTIDO!</h2>
        <p>{{ nome }}</p>
        <div class="qr-box"><div id="qrcode"></div></div>
        <p style="font-size:0.8rem; color:#888;">Apresente este QR Code na entrada.</p>
        <hr style="border:0; border-top:1px solid #333; margin:20px 0;">
        <p>Valor: R$ {{ "%.2f"|format(valor) }}</p>
        <a href="https://wa.me/5521980737063?text=Oi! Fiz o Pix do ingresso de {{ nome }}." class="btn-zap">ENVIAR COMPROVANTE PIX</a>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        new QRCode(document.getElementById("qrcode"), {
            text: "https://evento-samba.onrender.com/checkin/{{ id_cliente }}",
            width: 150, height: 150
        });
    </script>
</body>
</html>
