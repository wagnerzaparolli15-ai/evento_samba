<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seu Ingresso</title>
    <style>
        body { background: #111; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .ticket { background: #fff; color: #000; max-width: 320px; margin: 20px auto; padding: 20px; border-radius: 15px; }
        #qrcode { display: flex; justify-content: center; margin: 15px 0; }
        .btn-zap { background: #25d366; color: #fff; padding: 15px; text-decoration: none; display: block; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>
    <h2 style="color:#f1c40f">RESERVA CONFIRMADA!</h2>
    <div class="ticket">
        <h3 style="margin:0;">{{ nome }}</h3>
        <p style="background:#000; color:#f1c40f; padding:5px;">INGRESSO + FEIJOADA 🍲</p>
        <div id="qrcode"></div>
        <p style="font-size:0.8rem; color:#666;">Apresente este QR Code na entrada. Uso único.</p>
    </div>
    <a href="https://wa.me/5521980737063?text=Comprovante de {{ nome }}" class="btn-zap">ENVIAR COMPROVANTE VIA WHATSAPP</a>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        window.onload = function() {
            new QRCode(document.getElementById("qrcode"), {
                text: "{{ checkin_url }}",
                width: 180, height: 180
            });
        };
    </script>
</body>
</html>
