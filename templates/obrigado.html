<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seu Ingresso - Bafafá 2026</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; margin: 0; }
        .ticket-box { background: #111; border: 2px solid #f1c40f; padding: 25px 20px; border-radius: 15px; max-width: 400px; margin: 30px auto; box-shadow: 0 0 20px rgba(241, 196, 15, 0.2); }
        h2 { color: #f1c40f; margin-top: 0; font-size: 1.8rem; letter-spacing: 2px; }
        h3 { font-size: 1.5rem; margin: 10px 0; }
        .qr-area { background: #fff; padding: 15px; display: inline-block; border-radius: 10px; margin: 20px 0; }
        .btn-bar { display: block; background: #f1c40f; color: #000; padding: 15px; text-decoration: none; border-radius: 8px; font-weight: bold; font-size: 1.1rem; transition: 0.3s; margin-top: 15px; }
        .instrucao { color: #aaa; font-size: 0.9rem; margin-top: 25px; border-top: 1px solid #333; padding-top: 15px; }
    </style>
</head>
<body>

    <div class="ticket-box">
        <h2><i class="fas fa-ticket-alt"></i> INGRESSO VIP</h2>
        <h3>{{ c.nome }}</h3>
        
        <p style="color: #ccc;">Apresente este código na portaria para entrar no evento.</p>
        
        <div class="qr-area">
            <img src="data:image/png;base64,{{ qr_checkin }}" width="200" alt="QR Code Ingresso">
        </div>
        
        <div class="instrucao">
            <p><strong>Já teve sua entrada validada pela portaria?</strong></p>
            <p>Acesse agora o sistema de bebidas no seu celular sem pegar fila no caixa!</p>
        </div>

        <a href="/bar-digital/{{ c.id }}" class="btn-bar">
            <i class="fas fa-beer"></i> ABRIR MEU BAR DIGITAL
        </a>
    </div>

</body>
</html>
