<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bar Digital - Bafafá 2026</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #f1c40f; --bg: #050505; }
        body { 
            background: linear-gradient(135deg, #050505 0%, #1a1a00 100%); 
            background-attachment: fixed; color: #fff; font-family: sans-serif; margin: 0; padding-bottom: 50px;
        }
        .header { text-align: center; padding: 20px; border-bottom: 2px solid var(--gold); background: rgba(0,0,0,0.8); }
        .header img { width: 80px; }
        .container { padding: 15px; }
        .vitrine { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card-prod { background: rgba(20,20,20,0.9); border: 1px solid #333; border-radius: 15px; padding: 10px; text-align: center; }
        .card-prod img { width: 100%; border-radius: 10px; }
        .preco { color: var(--gold); font-weight: bold; display: block; margin: 10px 0; }
        .btn-add { background: var(--gold); color: #000; border: none; padding: 10px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; }
        .carrinho-box { background: rgba(241,196,15,0.05); border: 2px solid var(--gold); border-radius: 15px; padding: 20px; margin-top: 25px; }
        .qr-final { background: #fff; padding: 15px; border-radius: 15px; display: inline-block; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="header">
        <img src="{{ url_for('static', filename='logo.png') }}">
        <h2 style="color:var(--gold); margin: 10px 0 0 0;">BAR DIGITAL</h2>
    </div>

    <div class="container">
        <div class="vitrine">
            {% for p in produtos %}
            <div class="card-prod">
                <img src="{{ url_for('static', filename='produtos/' + p.imagem_url) }}">
                <p style="margin: 10px 0; font-size: 0.9rem;">{{ p.nome }}</p>
                <span class="preco">R$ {{ p.preco_venda }}</span>
                <form method="POST">
                    <input type="hidden" name="produto_id" value="{{ p.id }}">
                    <button type="submit" class="btn-add">ADICIONAR</button>
                </form>
            </div>
            {% endfor %}
        </div>

        {% if carrinho %}
        <div class="carrinho-box">
            <h3 style="color:var(--gold); margin-top:0;"><i class="fas fa-shopping-basket"></i> SEU CARRINHO</h3>
            {% for item in carrinho %}
                <p style="border-bottom: 1px solid #222; padding: 5px 0;">• Item ID: {{ item.produto_id }}</p>
            {% endfor %}
            <form action="/finalizar-carrinho/{{ c.id }}" method="POST" style="margin-top:20px;">
                <label>Forma de Pagamento no Balcão:</label>
                <select name="metodo_pagamento" style="width:100%; padding:12px; margin:10px 0; background:#000; color:#fff; border:1px solid var(--gold); border-radius:8px;">
                    <option value="PIX">PIX</option>
                    <option value="CARTÃO">CARTÃO</option>
                    <option value="DINHEIRO">DINHEIRO</option>
                </select>
                <button type="submit" class="btn-add" style="background:#00ff88; color:#000;">GERAR QR CODE DE RETIRADA</button>
            </form>
        </div>
        {% endif %}

        {% if qr_pedido %}
        <div class="card-prod" style="margin-top:25px; border-color:#00ff88;">
            <h3 style="color:#00ff88;">PEDIDO CONFIRMADO!</h3>
            <p>Apresente este código para retirar:</p>
            <div class="qr-final">
                <img src="data:image/png;base64,{{ qr_pedido }}" width="180">
            </div>
        </div>
        {% endif %}
    </div>

</body>
</html>
