<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Equipe - Bafafá</title>
    <style>
        body { background: #000; color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: #1a1a1a; padding: 30px; border-radius: 20px; border: 2px solid #f1c40f; width: 320px; text-align: center; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #222; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #f1c40f; color: black; border: none; font-weight: bold; border-radius: 8px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <img src="/static/logo.jpg" style="width: 80px; margin-bottom: 15px;">
        <h2 style="color: #f1c40f; margin-bottom: 20px;">EQUIPE BAF AFÁ</h2>
        <form method="POST">
            <input type="text" name="username" placeholder="Usuário" required>
            <input type="password" name="senha" placeholder="Senha" required>
            <button type="submit">ENTRAR NO SISTEMA</button>
        </form>
    </div>
</body>
</html>
