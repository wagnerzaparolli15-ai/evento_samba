<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Login - Bafafá</title>
    <style>
        body { background: linear-gradient(135deg, #050505 0%, #1a1a00 100%); color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: rgba(20,20,20,0.9); padding: 40px; border-radius: 20px; border: 1px solid #f1c40f; text-align: center; width: 300px; }
        img.logo { width: 80px; margin-bottom: 20px; }
        input { background: #000; color: #fff; border: 1px solid #333; padding: 12px; border-radius: 8px; width: 100%; margin-bottom: 15px; box-sizing: border-box; }
        button { background: #f1c40f; color: #000; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="login-card">
        <img src="{{ url_for('static', filename='logo.png') }}" class="logo">
        <h3 style="color:#f1c40f">ACESSO STAFF</h3>
        <form method="POST">
            <input type="text" name="username" placeholder="Usuário" required>
            <input type="password" name="senha" placeholder="Senha" required>
            <button type="submit">ENTRAR</button>
        </form>
    </div>
</body>
</html>
