<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - Pagode do Cara</title>
    <style>
        body { font-family: sans-serif; background: #111; color: white; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .card { background: #222; padding: 20px; border-radius: 10px; border-bottom: 4px solid #f1c40f; text-align: center; }
        table { width: 100%; border-collapse: collapse; background: #222; }
        th, td { padding: 12px; border-bottom: 1px solid #333; text-align: left; }
        th { color: #f1c40f; }
        .status { font-weight: bold; padding: 4px 8px; border-radius: 4px; }
        .pago { background: #2ecc71; color: black; }
    </style>
</head>
<body>
    <h1>Painel Administrativo 🍲</h1>
    <div class="grid">
        <div class="card"><h3>VENDIDOS</h3><p>{{ pagos }}</p></div>
        <div class="card"><h3>NA CASA</h3><p>{{ na_casa }}</p></div>
        <div class="card"><h3>TOTAL</h3><p>R$ {{ faturamento }}</p></div>
    </div>
    <table>
        <tr><th>Nome</th><th>WhatsApp</th><th>Status</th><th>Presença</th></tr>
        {% for c in clientes %}
        <tr>
            <td>{{ c.nome }}</td>
            <td>{{ c.telefone }}</td>
            <td><span class="status {{ 'pago' if c.pago }}">{{ 'PAGO' if c.pago else 'PENDENTE' }}</span></td>
            <td>{{ '✅ DENTRO' if c.utilizado else '❌ FORA' }}</td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
