<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel Admin</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border: 1px solid #333; text-align: left; }
        th { background: #111; color: #f1c40f; }
        .stats { display: flex; gap: 20px; margin-bottom: 20px; }
        .stat-box { background: #111; padding: 20px; border: 1px solid #f1c40f; flex: 1; text-align: center; }
    </style>
</head>
<body>
    <h1>Faz com Fé - Gestão</h1>
    <div class="stats">
        <div class="stat-box"><h3>Total</h3><p>{{ total }}</p></div>
        <div class="stat-box"><h3>Caixa</h3><p>R$ {{ "%.2f"|format(faturamento) }}</p></div>
    </div>
    <table>
        <tr><th>ID</th><th>Nome</th><th>Lote</th><th>Valor</th><th>Status</th></tr>
        {% for c in clientes %}
        <tr>
            <td>#{{ c.id }}</td>
            <td>{{ c.nome }}</td>
            <td>{{ c.lote }}º</td>
            <td>R$ {{ "%.2f"|format(c.valor_pago) }}</td>
            <td>{{ "✅ OK" if c.compareceu else "❌ AUSENTE" }}</td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
