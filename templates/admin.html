<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel de Vendas - CARA 2026</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; }
        .container { max-width: 800px; margin: auto; border: 1px solid #f1c40f; padding: 20px; border-radius: 10px; }
        h1 { color: #f1c40f; text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border-bottom: 1px solid #333; padding: 15px; text-align: left; }
        th { color: #f1c40f; text-transform: uppercase; font-size: 0.8rem; }
        .btn-zap { background: #25d366; color: #fff; text-decoration: none; padding: 5px 10px; border-radius: 5px; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>GESTOR DE VENDAS - FAZ COM FÉ</h1>
        <p>Total de Clientes: <strong>{{ clientes|length }}</strong></p>
        <table>
            <thead>
                <tr>
                    <th>Nome do Cliente</th>
                    <th>WhatsApp</th>
                    <th>Ação</th>
                </tr>
            </thead>
            <tbody>
                {% for c in clientes %}
                <tr>
                    <td>{{ c.nome }}</td>
                    <td>{{ c.telefone }}</td>
                    <td><a href="https://wa.me/{{ c.telefone }}" target="_blank" class="btn-zap">Chamar no Zap</a></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
