<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel Gestor | Faz com Fé</title>
    <style>
        body { background: #050505; color: #eee; font-family: sans-serif; padding: 20px; }
        .grid-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .stat-card { background: #111; border: 1px solid #333; padding: 15px; border-radius: 10px; text-align: center; }
        .stat-card p { color: #f1c40f; font-size: 1.5rem; font-weight: bold; margin: 5px 0; }
        table { width: 100%; border-collapse: collapse; background: #111; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #222; font-size: 0.9rem; }
        th { color: #f1c40f; text-transform: uppercase; }
        .lote-tag { background: #333; padding: 3px 8px; border-radius: 4px; font-size: 0.7rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>CONTROLE DE VENDAS</h1>
        <div class="grid-stats">
            <div class="stat-card"><h3>Vendas</h3><p>{{ total }} / 150</p></div>
            <div class="stat-card"><h3>Presença</h3><p>{{ presentes }}</p></div>
            <div class="stat-card"><h3>Faturamento</h3><p>R$ {{ "%.2f"|format(faturamento) }}</p></div>
        </div>
        <table>
            <thead>
                <tr><th>ID</th><th>Nome</th><th>Lote</th><th>Valor</th><th>Status</th></tr>
            </thead>
            <tbody>
                {% for c in clientes %}
                <tr>
                    <td>#{{ c.id }}</td>
                    <td>{{ c.nome }}</td>
                    <td><span class="lote-tag">{{ c.lote }}º Lote</span></td>
                    <td>R$ {{ "%.2f"|format(c.valor_pago) }}</td>
                    <td>{{ "✅" if c.compareceu else "❌" }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
