<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gestão | Faz com Fé</title>
    <style>
        body { background: #050505; color: #fff; font-family: sans-serif; padding: 40px; }
        table { width: 100%; border-collapse: collapse; background: #111; margin-top: 20px; }
        th, td { border: 1px solid #222; padding: 15px; text-align: left; }
        th { text-transform: uppercase; font-size: 0.7rem; color: #444; letter-spacing: 2px; }
        .status-pago { color: #25d366; font-weight: bold; }
        .btn-confirm { background: #fff; color: #000; padding: 7px 12px; text-decoration: none; font-size: 0.7rem; font-weight: bold; }
    </style>
</head>
<body>
    <h1 style="letter-spacing: 5px;">GESTÃO DE VENDAS</h1>
    <table>
        <thead>
            <tr>
                <th>Nome</th>
                <th>WhatsApp</th>
                <th>Status</th>
                <th>Ação</th>
            </tr>
        </thead>
        <tbody>
            {% for cliente in clientes %}
            <tr>
                <td>{{ cliente.nome }}</td>
                <td>{{ cliente.telefone }}</td>
                <td class="{{ 'status-pago' if cliente.pago == 'PAGO' else '' }}">{{ cliente.pago }}</td>
                <td>
                    {% if cliente.pago != 'PAGO' %}
                    <a href="/confirmar/{{ cliente.id }}" class="btn-confirm">VALIDAR</a>
                    {% endif %}
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
