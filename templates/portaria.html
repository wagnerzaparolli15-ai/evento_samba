<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portaria - Bafafá</title>
    <style>
        body { background: #000; color: white; font-family: sans-serif; text-align: center; margin: 0; }
        .header { background: #111; padding: 20px; border-bottom: 3px solid #f1c40f; }
        .card { background: #1a1a1a; padding: 15px; margin: 10px; border-radius: 10px; border-left: 5px solid #f1c40f; display: flex; justify-content: space-between; align-items: center; text-align: left; }
        .btn-liberar { background: #2ecc71; color: #000; text-decoration: none; padding: 10px 15px; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header">
        <img src="/static/logo.jpg" style="width: 80px; border-radius: 50%;">
        <h2 style="color: #f1c40f; margin: 5px 0;">PORTARIA BAF AFÁ 🎷</h2>
        <p style="font-size: 12px;">Operador: {{ session['usuario_nome'] }} | <a href="/logout" style="color:#e74c3c;">Sair</a></p>
    </div>

    <div style="max-width: 500px; margin: auto; padding: 10px;">
        {% for c in clientes %}
        <div class="card">
            <div>
                <b style="text-transform: uppercase;">{{ c.nome }}</b><br>
                <small style="color: #888;">{{ c.telefone }}</small>
            </div>
            {% if not c.na_casa %}
                <a href="/validar-entrada/{{ c.id }}" class="btn-liberar">LIBERAR</a>
            {% else %}
                <span style="color: #e74c3c; font-weight: bold;">DENTRO ({{ c.quem_liberou }})</span>
            {% endif %}
        </div>
        {% endfor %}
    </div>
</body>
</html>
