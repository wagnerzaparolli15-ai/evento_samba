<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Portaria Bafafá</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; padding: 15px; }
        .cliente-box { background: #111; padding: 15px; border-radius: 10px; border: 1px solid #333; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;}
        .btn-validar { background: #00ff88; color: #000; padding: 10px; text-decoration: none; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>
    <h2>Check-in Portaria</h2>
    <p>Olá, {{ session.usuario_nome }}</p>
    <hr>
    {% for c in clientes %}
    <div class="cliente-box">
        <span>{{ c.nome }}</span>
        <a href="/validar-entrada/{{ c.id }}" class="btn-validar">VALIDAR</a>
    </div>
    {% endfor %}
    <br>
    <a href="/logout" style="color: #666;">Sair do Sistema</a>
</body>
</html>
