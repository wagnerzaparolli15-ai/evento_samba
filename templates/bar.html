<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Bar - Feijoada, Samba & Bafafá</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; margin: 0; height: 100vh; overflow: hidden; }
        .catalogo { flex: 2; padding: 20px; overflow-y: auto; border-right: 2px solid #333; }
        .checkout { flex: 1; background: #111; padding: 20px; display: flex; flex-direction: column; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; }
        .card { background: #1a1a1a; padding: 10px; border-radius: 10px; text-align: center; border: 1px solid #333; }
        .card img { width: 100%; height: 90px; object-fit: cover; border-radius: 5px; }
        .btn-add { background: #f1c40f; border: none; width: 100%; padding: 8px; font-weight: bold; border-radius: 5px; cursor: pointer; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="catalogo">
        <h2 style="color:#f1c40f">CARDÁPIO 🍺</h2>
        <div class="grid">
            {% for p in produtos %}
            <div class="card">
                <img src="{{ p.imagem_url }}" alt="{{ p.nome }}">
                <p>{{ p.nome }}</p>
                <b style="color:#f1c40f">R$ {{ "%.2f"|format(p.preco) }}</b>
                <button class="btn-add" onclick="add('{{ p.nome }}', {{ p.preco }})">ADICIONAR</button>
            </div>
            {% endfor %}
        </div>
    </div>
    <div class="checkout">
        <h3>Seu Pedido</h3>
        <p>Cliente: <strong>{{ c.nome }}</strong></p>
        <div id="carrinho" style="flex-grow:1; border:1px dashed #444; padding:10px; overflow-y:auto;"></div>
        <div id="val-total" style="font-size: 32px; color: #f1c40f; font-weight: bold; text-align: center;">R$ 0,00</div>
        <button class="btn-add" style="padding:15px; font-size:18px;">GERAR PIX AGORA</button>
    </div>
    <script>
        let total = 0;
        function add(n, p) { 
            total += p; 
            document.getElementById('val-total').innerText = `R$ ${total.toFixed(2)}`;
            const el = document.createElement('div'); el.innerText = `${n} - R$ ${p.toFixed(2)}`;
            document.getElementById('carrinho').appendChild(el);
        }
    </script>
</body>
</html>
