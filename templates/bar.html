<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bar Digital - Bafafá 2026</title>
    <style>
        :root { --gold: #f1c40f; --bg: #000; --card: #111; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; padding: 20px; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 15px; max-width: 800px; margin: 20px auto; }
        .card { background: var(--card); border: 1px solid #333; border-radius: 15px; padding: 15px; transition: 0.3s; }
        .card:hover { border-color: var(--gold); }
        .img-p { width: 100%; border-radius: 10px; margin-bottom: 10px; height: 120px; object-fit: cover; }
        .price { color: #00ff88; font-size: 1.3rem; font-weight: bold; display: block; margin: 10px 0; }
        .btn { background: var(--gold); color: #000; border: none; width: 100%; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <img src="/static/logo.png" style="width: 80px; border-radius: 50%;">
    <h1>Cardápio Digital</h1>
    <p>Olá, <strong>{{ c.nome }}</strong>! Escolha sua bebida:</p>

    <div class="grid">
        {% for p in produtos %}
        <div class="card">
            <img src="/static/produtos/{{ p.imagem }}" class="img-p" onerror="this.src='/static/logo.png'">
            <strong>{{ p.nome }}</strong>
            <span class="price">R$ {{ "%.2f"|format(p.preco_venda) }}</span>
            <button class="btn" onclick="alert('Pedido de {{ p.nome }} enviado!')">PEDIR</button>
        </div>
        {% endfor %}
    </div>
</body>
</html>
