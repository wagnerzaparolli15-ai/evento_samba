<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bar Digital - Bafafá</title>
    <style>
        body { background: #000; color: white; font-family: sans-serif; padding: 15px; }
        .grid-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; }
        .card-prod { background: #111; border: 1px solid #333; border-radius: 15px; padding: 10px; text-align: center; }
        .img-prod { width: 100%; border-radius: 10px; margin-bottom: 10px; }
        .preco { color: #00ff88; font-weight: bold; font-size: 1.2rem; }
        .btn-pedir { background: #f1c40f; color: black; border: none; width: 100%; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <center>
        <img src="/static/logo.png" style="width: 80px; border-radius: 50%;">
        <h2>Bar Digital Bafafá</h2>
        <p>Cliente: {{ c.nome }}</p>
    </center>

    <div class="grid-bar">
        {% for p in produtos %}
        <div class="card-prod">
            <img src="/static/produtos/{{ p.imagem }}" class="img-prod">
            <strong>{{ p.nome }}</strong><br>
            <span class="preco">R$ {{ "%.2f"|format(p.preco_venda) }}</span>
            <button class="btn-pedir" onclick="pedir({{ p.id }})">PEDIR AGORA</button>
        </div>
        {% endfor %}
    </div>

    <script>
        function pedir(id) {
            alert("Pedido enviado para o balcão! Prepare o QR Code de pagamento.");
        }
    </script>
</body>
</html>
