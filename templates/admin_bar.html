<body style="background:#121212; color:white; font-family:sans-serif; padding:10px;">
    <h2>FINANCEIRO E ESTOQUE BAF AFÁ 🎷</h2>
    
    <div style="background:#1e1e1e; padding:15px; border-radius:10px; margin-bottom:20px; border:1px solid #f1c40f;">
        <h3 style="color:#f1c40f;">Resumo Geral</h3>
        <p>CUSTO TOTAL: <b>R$ {{ "%.2f"|format(custo_total) }}</b></p>
        <p>LUCRO PREVISTO: <b style="color:#2ecc71;">R$ {{ "%.2f"|format(lucro) }}</b></p>
    </div>

    <table style="width:100%; border-collapse: collapse; font-size: 12px;">
        <tr style="color:#f1c40f;">
            <th>PRODUTO</th>
            <th>CUSTO (R$)</th>
            <th>VENDA (R$)</th>
            <th>ESTOQUE</th>
            <th>AÇÃO</th>
        </tr>
        {% for p in produtos %}
        <tr style="border-bottom:1px solid #333;">
            <form method="POST">
                <td>{{ p.nome }}</td>
                <td><input type="number" step="0.01" name="custo" value="{{ p.preco_custo }}" style="width:60px; background:#222; color:white;"></td>
                <td><input type="number" step="0.01" name="venda" value="{{ p.preco_venda }}" style="width:60px; background:#222; color:white;"></td>
                <td><input type="number" name="estoque" value="{{ p.estoque_inicial }}" style="width:50px; background:#222; color:white;"></td>
                <td>
                    <input type="hidden" name="id_prod" value="{{ p.id }}">
                    <button type="submit" style="background:#f1c40f; border:none; padding:5px; border-radius:3px; cursor:pointer;">💾</button>
                </td>
            </form>
        </tr>
        {% endfor %}
    </table>
</body>
