<!DOCTYPE html>
<html>
<head>
    <title>Admin Bafafá</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 10px; border-bottom: 1px solid #333; text-align: left; }
        input { background: #000; color: #f1c40f; border: 1px solid #444; width: 60px; }
    </style>
</head>
<body>
    <h2 style="color: #f1c40f;">FINANCEIRO</h2>
    <p>Custo Total: R$ {{ "%.2f"|format(custo_total) }} | <b>Lucro: R$ {{ "%.2f"|format(lucro) }}</b></p>
    
    <form action="/admin/reset-total" method="POST" onsubmit="return confirm('Zerar tudo?')">
        <button type="submit" style="background: red; color: white; padding: 10px; border: none; border-radius: 5px;">🚨 RESETAR EVENTO</button>
    </form>

    <table>
        <tr><th>Produto</th><th>Custo</th><th>Venda</th><th>Estoque</th><th>Salvar</th></tr>
        {% for p in produtos %}
        <tr>
            <form method="POST">
                <input type="hidden" name="id_prod" value="{{ p.id }}">
                <td>{{ p.nome }}</td>
                <td><input type="number" step="0.01" name="custo" value="{{ p.preco_custo }}"></td>
                <td><input type="number" step="0.01" name="venda" value="{{ p.preco_venda }}"></td>
                <td><input type="number" name="estoque" value="{{ p.estoque_inicial }}"></td>
                <td><button type="submit">💾</button></td>
            </form>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
