<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Admin - Faz com Fé</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; padding: 20px; }
        .card { background: #2d2d2d; padding: 15px; margin-bottom: 20px; border-radius: 10px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; border-bottom: 1px solid #444; text-align: left; }
        .btn { background: #28a745; color: white; padding: 8px; border: none; cursor: pointer; text-decoration: none; border-radius: 5px; }
    </style>
</head>
<body>
    <h2>📊 Painel do Bafafá</h2>
    
    <div class="card">
        <h3>👥 Check-in de Convidados</h3>
        <table>
            <tr><th>Nome</th><th>Status</th><th>Ação</th></tr>
            {% for c in clientes %}
            <tr>
                <td>{{ c.nome }}</td>
                <td>{{ "No Bar" if c.utilizado else "Aguardando" }}</td>
                <td>
                    {% if not c.utilizado %}
                    <a href="{{ url_for('checkin', id=c.id) }}" class="btn">Dar Baixa / Liberar Bar</a>
                    {% endif %}
                </td>
            </tr>
            {% endfor %}
        </table>
    </div>

    <div class="card">
        <h3>➕ Adicionar Produto ao Bar</h3>
        <form method="POST">
            <input type="text" name="nome" placeholder="Nome" required>
            <input type="number" step="0.01" name="preco_venda" placeholder="Preço Venda" required>
            <input type="number" step="0.01" name="preco_custo" placeholder="Preço Custo" required>
            <input type="number" name="estoque" placeholder="Estoque" required>
            <select name="categoria"><option value="BEBIDAS">BEBIDAS</option><option value="COMIDA">COMIDA</option></select>
            <button type="submit" class="btn">Salvar</button>
        </form>
    </div>
</body>
</html>
