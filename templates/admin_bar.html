<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Admin - Bafafá</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; padding: 20px; }
        .financeiro { display: flex; gap: 20px; margin-bottom: 20px; }
        .card-fin { background: #1e1e1e; padding: 20px; border-radius: 10px; border: 1px solid #f1c40f; flex: 1; text-align: center; }
        table { width: 100%; border-collapse: collapse; background: #1e1e1e; border-radius: 10px; overflow: hidden; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #333; }
        th { color: #f1c40f; }
        input { background: #000; color: #f1c40f; border: 1px solid #444; padding: 5px; width: 60px; text-align: center; }
    </style>
</head>
<body>
    <div style="text-align: center; margin-bottom: 30px;">
        <img src="/static/logo.jpg" style="width: 100px; border-radius: 50%;">
        <h2 style="color: #f1c40f;">GESTÃO BAF AFÁ 🎷</h2>
        <form action="/admin/reset-total" method="POST" onsubmit="return confirm('APAGAR TUDO?')">
            <button type="submit" style="background: #e74c3c; color: white; border: none; padding: 10px; border-radius: 5px; font-weight: bold;">🚨 RESETAR EVENTO</button>
        </form>
    </div>

    <div class="financeiro">
        <div class="card-fin">CUSTO TOTAL: <br><b>R$ {{ "%.2f"|format(custo_total) }}</b></div>
        <div class="card-fin">LUCRO ESTIMADO: <br><b style="color: #2ecc71;">R$ {{ "%.2f"|format(lucro) }}</b></div>
    </div>

    <table>
        <tr><th>Produto</th><th>Custo (R$)</th><th>Venda (R$)</th><th>Estoque</th><th>Salvar</th></tr>
        {% for p in produtos %}
        <tr>
            <form method="POST">
                <input type="hidden" name="id_prod" value="{{ p.id }}">
                <td>{{ p.nome }}</td>
                <td><input type="number" step="0.01" name="custo" value="{{ p.preco_custo }}"></td>
                <td><input type="number" step="0.01" name="venda" value="{{ p.preco_venda }}"></td>
                <td><input type="number" name="estoque" value="{{ p.estoque_inicial }}"></td>
                <td><button type="submit" style="background: #f1c40f; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer;">💾</button></td>
            </form>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
