<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Portaria & Bar Bafafá</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; padding: 20px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 12px; border: 1px solid #f1c40f; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; border-bottom: 1px solid #333; text-align: left; }
        .btn { padding: 10px 20px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; text-decoration: none; display: inline-block; }
        .btn-yellow { background: #f1c40f; color: black; }
        .status-ok { color: #2ecc71; font-weight: bold; }
        input { padding: 10px; background: #222; border: 1px solid #444; color: white; border-radius: 5px; margin: 5px; }
    </style>
</head>
<body>
    <h2>🚀 Portaria & Gestão de Bar</h2>
    <div class="card">
        <h3>👥 Lista de Entrada</h3>
        <table>
            <tr><th>Nome</th><th>Status</th><th>Ação</th></tr>
            {% for c in clientes %}
            <tr>
                <td>{{ c.nome }}</td>
                <td>{{ "✅ NO BAR" if c.utilizado else "⏳ AGUARDANDO" }}</td>
                <td>
                    {% if not c.utilizado %}
                    <a href="{{ url_for('checkin', id=c.id) }}" class="btn btn-yellow">CONFIRMAR</a>
                    {% else %}
                    <span class="status-ok">VALIDADO</span>
                    {% endif %}
                </td>
            </tr>
            {% endfor %}
        </table>
    </div>
</body>
</html>
