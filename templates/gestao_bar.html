<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operação Bar - Staff</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; text-align: center; padding: 20px; }
        h1 { color: #f1c40f; text-transform: uppercase; border-bottom: 2px solid #333; padding-bottom: 10px; }
        
        .leitor-box { background: #111; padding: 20px; border-radius: 15px; border: 2px solid #f1c40f; max-width: 500px; margin: 0 auto 30px; }
        #reader { width: 100%; border-radius: 10px; overflow: hidden; border: none; }
        
        .estoque-box { max-width: 500px; margin: auto; text-align: left; background: #111; padding: 20px; border-radius: 15px; border: 1px solid #333; }
        .estoque-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #222; }
        .estoque-item:last-child { border-bottom: none; }
        
        .btn-sair { display: inline-block; background: #e74c3c; color: #fff; padding: 12px 25px; text-decoration: none; border-radius: 8px; font-weight: bold; margin-top: 30px; }
    </style>
</head>
<body>

    <h1><i class="fas fa-cash-register"></i> PAINEL DO BARMAN</h1>

    <div class="leitor-box">
        <h3 style="margin-top: 0;"><i class="fas fa-camera"></i> ESCANEAR TICKET DO CLIENTE</h3>
        <p style="color: #aaa; font-size: 0.9rem;">Aponte a câmera para o celular do cliente para liberar o pedido e garantir sua caixinha.</p>
        <div id="reader"></div>
        <script>
            function onScanSuccess(decodedText) { window.location.href = decodedText; }
            let scanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: {width: 250, height: 250} });
            scanner.render(onScanSuccess);
        </script>
    </div>

    <div class="estoque-box">
        <h3><i class="fas fa-boxes"></i> POSIÇÃO DE ESTOQUE</h3>
        {% for p in produtos %}
        <div class="estoque-item">
            <span>{{ p.nome }}</span>
            <span style="color: {% if p.estoque > 10 %}#2ecc71{% else %}#e74c3c{% endif %}; font-weight: bold;">
                {{ p.estoque }} unidades
            </span>
        </div>
        {% else %}
        <p style="color: #888;">Nenhum produto no bar.</p>
        {% endfor %}
    </div>

    <a href="/logout" class="btn-sair"><i class="fas fa-sign-out-alt"></i> SAIR DO CAIXA</a>

</body>
</html>
