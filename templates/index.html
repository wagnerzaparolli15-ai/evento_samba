<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Pagode do Cara - Ingressos</title>
    <style>
        body { background: #000; font-family: sans-serif; color: white; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .box { background: rgba(0,0,0,0.85); padding: 30px; border-radius: 20px; border: 2px solid #f1c40f; text-align: center; max-width: 400px; }
        .preco { font-size: 45px; color: #2ecc71; font-weight: bold; margin: 15px 0; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; }
        button { width: 100%; background: #f1c40f; color: #000; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h1>INGRESSO + FEIJOADA</h1>
        <div class="preco">R$ {{ "%.2f"|format(preco) }}</div>
        <form action="/reservar" method="POST">
            <input type="text" name="nome" placeholder="Nome Completo" required>
            <input type="tel" name="telefone" placeholder="WhatsApp com DDD" required>
            <button type="submit">GERAR PIX</button>
        </form>
    </div>
</body>
</html>
