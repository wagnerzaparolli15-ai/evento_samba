<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faz com Fé - CARA 2026</title>
    <style>
        body { background-color: #0b0b0b; color: #fff; font-family: sans-serif; text-align: center; padding: 50px; }
        .card { background: #1a1a1a; padding: 30px; border-radius: 15px; border: 2px solid #f1c40f; display: inline-block; max-width: 400px; }
        h1 { color: #f1c40f; margin-bottom: 10px; }
        input { display: block; width: 90%; margin: 15px auto; padding: 12px; border-radius: 5px; border: none; }
        button { background: #f1c40f; color: #000; border: none; padding: 15px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 95%; font-size: 1rem; }
        button:hover { background: #d4af37; }
    </style>
</head>
<body>
    <div class="card">
        <h1>FAZ COM FÉ</h1>
        <p>Garanta seu ingresso para a Feijoada do CARA 2026</p>
        <form action="/comprar" method="POST">
            <input type="text" name="nome" placeholder="Seu Nome Completo" required>
            <input type="text" name="telefone" placeholder="Seu WhatsApp com DDD" required>
            <button type="submit">RESERVAR MEU INGRESSO</button>
        </form>
    </div>
</body>
</html>
