<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faz com Fé - Ingressos</title>
    <style>
        body { background: #000 url('/static/fundo.jpg') no-repeat center center fixed; background-size: cover; font-family: 'Segoe UI', sans-serif; color: white; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .container { background: rgba(0,0,0,0.85); padding: 30px; border-radius: 20px; border: 2px solid #f1c40f; text-align: center; max-width: 400px; width: 90%; }
        img { width: 150px; margin-bottom: 20px; }
        h1 { color: #f1c40f; margin: 0; font-size: 24px; }
        .preco { font-size: 40px; color: #2ecc71; margin: 15px 0; font-weight: bold; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; background: #f1c40f; color: black; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 18px; margin-top: 10px; transition: 0.3s; }
        button:hover { background: #d4ac0d; }
    </style>
</head>
<body>
    <div class="container">
        <img src="/static/logo.png" alt="Logo">
        <h1>FAZ COM FÉ</h1>
        <p>Garanta seu lugar no Pagode do Cara!</p>
        <div class="preco">R$ {{ "%.2f"|format(preco) }}</div>
        <form action="/reservar" method="POST">
            <input type="text" name="nome" placeholder="NOME COMPLETO" required>
            <input type="text" name="telefone" placeholder="WHATSAPP (DDD)" required>
            <button type="submit">RESERVAR AGORA</button>
        </form>
    </div>
</body>
</html>
