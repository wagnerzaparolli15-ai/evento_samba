<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faz com Fé | Ingressos</title>
    <style>
        body { 
            background-image: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url("{{ url_for('static', filename='fundo.jpg') }}");
            background-size: cover; background-position: center; background-attachment: fixed;
            color: #fff; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0;
        }
        .card { background: rgba(0,0,0,0.9); padding: 30px; border-radius: 15px; border: 2px solid #f1c40f; text-align: center; width: 320px; }
        .logo { width: 130px; margin-bottom: 15px; }
        .preco { color: #2ecc71; font-size: 2.2rem; font-weight: bold; margin: 10px 0; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 5px; border: none; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #f1c40f; border: none; font-weight: bold; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="card">
        <img src="{{ url_for('static', filename='logo.png') }}" class="logo">
        <div style="background:#e74c3c; display:inline-block; padding:2px 10px; border-radius:10px; font-size:0.8rem;">{{ lote }}º LOTE</div>
        <h2 style="color:#f1c40f; margin:10px 0;">INGRESSO + FEIJOADA</h2>
        <div class="preco">R$ {{ "%.2f"|format(preco) }}</div>
        {% if error %}<p style="color:red;">{{ error }}</p>{% endif %}
        <form action="/comprar" method="POST">
            <input type="text" name="nome" placeholder="NOME COMPLETO" required>
            <input type="tel" name="telefone" placeholder="WHATSAPP" required>
            <button type="submit">GARANTIR MEU LUGAR</button>
        </form>
    </div>
</body>
</html>
