<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faz com Fé | Samba</title>
    <style>
        body { background: url("{{ url_for('static', filename='plano-fundo.jpg') }}") no-repeat center center fixed; background-size: cover; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: rgba(0, 0, 0, 0.9); padding: 30px; border-radius: 15px; border: 2px solid #f1c40f; text-align: center; width: 320px; color: #fff; }
        .preco { color: #2ecc71; font-size: 2.2rem; font-weight: bold; margin: 15px 0; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 5px; border: 1px solid #333; background: #000; color: #fff; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #f1c40f; border: none; font-weight: bold; cursor: pointer; border-radius: 5px; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="card">
        <img src="{{ url_for('static', filename='logo-evento.png') }}" width="120">
        <h1 style="color:#f1c40f; font-size:1.2rem;">FEIJOADA & SAMBA</h1>
        <div style="background:#e74c3c; padding:5px; border-radius:20px; font-size:0.7rem;">{{ lote }}º LOTE</div>
        <div class="preco">R$ {{ "%.2f"|format(preco) }}</div>
        <form action="/comprar" method="POST">
            <input type="text" name="nome" placeholder="NOME COMPLETO" required>
            <input type="text" name="telefone" placeholder="WHATSAPP" required>
            <button type="submit">RESERVAR INGRESSO</button>
        </form>
    </div>
</body>
</html>
