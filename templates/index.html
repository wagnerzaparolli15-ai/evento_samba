<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faz com Fé - CARA 2026</title>
    <style>
        body { 
            /* AQUI CARREGA O FUNDO */
            background: url("{{ url_for('static', filename='plano-fundo.jpg') }}") no-repeat center center fixed; 
            background-size: cover;
            color: #fff; 
            font-family: sans-serif; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card { 
            background: rgba(26, 26, 26, 0.9); 
            padding: 40px; 
            border-radius: 15px; 
            border: 2px solid #f1c40f; 
            text-align: center;
            max-width: 400px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        .logo { width: 150px; margin-bottom: 20px; }
        h1 { color: #f1c40f; margin: 10px 0; font-size: 2rem; }
        input { display: block; width: 100%; margin: 15px 0; padding: 12px; border-radius: 5px; border: none; box-sizing: border-box; }
        button { background: #f1c40f; color: #000; border: none; padding: 15px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1.1rem; text-transform: uppercase; }
        button:hover { background: #d4af37; }
    </style>
</head>
<body>
    <div class="card">
        <img src="{{ url_for('static', filename='logo-evento.png') }}" alt="Logo CARA" class="logo">
        <h1>FAZ COM FÉ</h1>
        <p>Garanta seu ingresso para a Feijoada do CARA 2026</p>
        <form action="/comprar" method="POST">
            <input type="text" name="nome" placeholder="Seu Nome Completo" required>
            <input type="text" name="telefone" placeholder="Seu WhatsApp com DDD" required>
            <button type="submit">RESERVAR MEU INGRESSO</button>
        </form>
    </div>
</body>
</html>
