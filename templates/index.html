<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bafafá 2026 - Reserva</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #f1c40f; --bg: #050505; }
        body { 
            background: linear-gradient(135deg, #050505 0%, #1a1a00 100%);
            background-attachment: fixed; color: #fff; font-family: 'Segoe UI', sans-serif;
            display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0;
        }
        .container { background: rgba(20,20,20,0.9); padding: 30px; border-radius: 20px; border: 1px solid rgba(241,196,15,0.2); width: 90%; max-width: 400px; text-align: center; backdrop-filter: blur(10px); }
        img.logo { width: 120px; margin-bottom: 20px; }
        h2 { color: var(--gold); margin-bottom: 20px; }
        input { background: #000; color: #fff; border: 1px solid #333; padding: 12px; border-radius: 8px; width: 100%; margin-bottom: 15px; box-sizing: border-box; }
        .btn { background: var(--gold); color: #000; border: none; padding: 15px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="container">
        <img src="{{ url_for('static', filename='logo.png') }}" class="logo">
        <h2>RESERVA DE INGRESSO</h2>
        <form action="/reservar" method="POST">
            <input type="text" name="nome" placeholder="Seu Nome Completo" required>
            <input type="text" name="telefone" placeholder="Seu Telefone/WhatsApp" required>
            <button type="submit" class="btn">GERAR PIX DE PAGAMENTO</button>
        </form>
    </div>
</body>
</html>
